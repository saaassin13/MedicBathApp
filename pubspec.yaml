name: dairy_cow_teat_dipping
description: 奶牛药浴大数据管理中心移动端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理与路由
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0

  # 网络与存储
  dio: ^5.4.0
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI 组件
  fl_chart: ^0.65.0
  video_player: ^2.8.0
  intl: ^0.18.0

  # 消息提醒
  flutter_local_notifications: ^20.1.0
  overlay_support: ^2.0.0

  # 依赖注入
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mock/